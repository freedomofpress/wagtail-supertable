[tool.ruff]
target-version = "py312"
exclude = [
    "node_modules",
]

[tool.ruff.lint]
ignore = ["E501", "E266"]

[tool.ruff.lint.isort]
lines-after-imports = 2
section-order = [
    # the default, plus our Django and Wagtail sections
    "future",
    "standard-library",
    "django",
    "wagtail",
    "third-party",
    "first-party",
    "local-folder",
]

[tool.ruff.lint.isort.sections]
"django" = ["django"]
"wagtail" = ["wagtail"]
